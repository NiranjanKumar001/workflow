# ============================================
# PRODUCTION CONFIGURATION
# ============================================
# Use with: java -jar -Dspring.profiles.active=prod app.jar
# ============================================

spring:
  application:
    name: WorkFlow

  # ============================================
  # DATABASE CONFIGURATION
  # ============================================
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 600000

  # ============================================
  # JPA/HIBERNATE CONFIGURATION
  # ============================================
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate  # DO NOT use 'update' in production
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
    open-in-view: false

  # ============================================
  # FILE UPLOAD CONFIGURATION
  # ============================================
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
      file-size-threshold: 2KB

  # ============================================
  # OAUTH2 CLIENT CONFIGURATION
  # ============================================
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            client-name: Google
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://www.googleapis.com/oauth2/v4/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

  # ============================================
  # DEVTOOLS - DISABLED IN PRODUCTION
  # ============================================
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

  # ============================================
  # EMAIL CONFIGURATION
  # ============================================
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        transport:
          protocol: smtp
    default-encoding: UTF-8

# ============================================
# SERVER CONFIGURATION
# ============================================
server:
  port: ${PORT:8080}
  tomcat:
    max-http-form-post-size: 52428800  # 50MB
    max-swallow-size: 52428800
  servlet:
    context-path: /
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

# ============================================
# APP CONFIGURATION
# ============================================
app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI}
  email:
    from: ${EMAIL_FROM}
    from-name: WorkFlow Team
  frontend:
    url: ${FRONTEND_URL}
  verification:
    token-expiration: 86400000  # 24 hours
  password-reset:
    token-expiration: 3600000   # 1 hour

# ============================================
# JWT CONFIGURATION
# ============================================
jwt:
  secret: ${JWT_SECRET}
  expiration: 900000            # 15 minutes
  refresh-expiration: 604800000 # 7 days
  issuer: WorkFlow

# ============================================
# CORS CONFIGURATION
# ============================================
cors:
  allowed:
    origins: ${CORS_ALLOWED_ORIGINS}

# ============================================
# FILE UPLOAD DIRECTORY
# ============================================
file:
  upload-dir: ${UPLOAD_DIR:uploads}

# ============================================
# LOGGING CONFIGURATION - PRODUCTION
# ============================================
logging:
  level:
    root: INFO
    com.nabin.workflow: INFO
    org.springframework: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/workflow.log
    max-size: 10MB
    max-history: 30
