# ============================================
# APPLICATION CONFIGURATION
# ============================================
spring:
  application:
    name: WorkFlow

  # ============================================
  # DATABASE CONFIGURATION
  # ============================================
  datasource:
    url: jdbc:postgresql://localhost:5432/taskmanager_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:nabin99}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # ============================================
  # JPA/HIBERNATE CONFIGURATION
  # ============================================
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    open-in-view: false

  # ============================================
  # OAUTH2 CLIENT CONFIGURATION
  # ============================================
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 74808369318-qu1b3taqbc3b0bnvtjr01ujkppcla1la.apps.googleusercontent.com
            client-secret: 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
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            client-name: Google
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://www.googleapis.com/oauth2/v4/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

  # ============================================
  # DEVTOOLS
  # ============================================
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

# ============================================
# SERVER CONFIGURATION
# ============================================
server:
  port: 8080

# ============================================
# APP CONFIGURATION
# ============================================
app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:5173/auth/callback}

# ============================================
# JWT CONFIGURATION
# ============================================
jwt:
  secret: ${JWT_SECRET:MySecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm}
  expiration: 900000
  refresh-expiration: 604800000
  issuer: WorkFlow

# ============================================
# CORS CONFIGURATION
# ============================================
cors:
  allowed:
    origins: http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:4200

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging:
  level:
    com.nabin.taskmanager: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG