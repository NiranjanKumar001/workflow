spring:
  application:
    name: Task Manager

  datasource:
    url: jdbc:postgresql://localhost:5432/taskmanager
    username: ${DB_USERNAME:taskmanager_user}
    password: ${DB_PASSWORD:your_secure_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:default-secret-key-change-this-in-production}
  expiration: 86400000

logging:
  level:
    com.nabin.taskmanager: DEBUG
    org.hibernate.SQL: DEBUG